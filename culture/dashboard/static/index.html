<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Culture · Mission Control</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">culture · <span>mission control</span></div>
    <div class="topbar-actions">
      <span id="pending-badge" class="badge hidden">0 pending</span>
      <button id="btn-stop-pause" class="btn btn-warn" title="Pause every running agent">Pause all</button>
      <button id="btn-stop-kill" class="btn btn-danger" title="Kill every agent (emergency)">STOP&nbsp;ALL</button>
    </div>
  </header>
  <nav class="main-tabs">
    <button class="main-tab active" data-view="channels">Channels</button>
    <button class="main-tab" data-view="tree">Tree</button>
    <button class="main-tab" data-view="agents">Agents</button>
    <button class="main-tab" data-view="archived">Archived</button>
  </nav>
  <main class="layout">
    <section class="col col-agents">
      <div id="view-channels">
        <h2>Channels &mdash; live tasks</h2>
        <div id="channel-list" class="channel-list"></div>
      </div>
      <div id="view-tree" class="hidden">
        <h2>Projects &mdash; tree view</h2>
        <div id="tree-list" class="tree-list"></div>
      </div>
      <div id="view-agents" class="hidden">
        <h2>Agents</h2>
        <ul id="agent-list" class="agent-list"></ul>
      </div>
      <div id="view-archived" class="hidden">
        <h2>Archived</h2>
        <div id="archived-list"></div>
      </div>
    </section>
    <section class="col col-stream">
      <h2 id="stream-title">Activity</h2>
      <div class="stream-tabs">
        <button class="tab active" data-kind="audit">Activity</button>
        <button class="tab" data-kind="daemon-log">Daemon actions</button>
        <button class="tab" data-kind="chat">Chat</button>
      </div>
      <div id="stream" class="stream" aria-live="polite"></div>
      <div id="chat-input" class="chat-input hidden">
        <input id="chat-text" type="text" autocomplete="off"
               placeholder="Message this agent..." />
        <button id="chat-send" class="btn btn-ok">Send</button>
      </div>
    </section>
    <section class="col col-perms">
      <h2>Pending approvals</h2>
      <ul id="pending-list" class="pending-list"></ul>
      <!-- Phase 7.5: human chat panel. DM any agent on the mesh AS the
           human nick — humans are first-class participants (AD-5 / Rule 3). -->
      <div id="human-chat" class="human-chat">
        <h3>Human DM</h3>
        <div class="human-chat-row">
          <input id="human-chat-nick" type="text" autocomplete="off"
                 placeholder="your nick (e.g. edo)" />
          <input id="human-chat-target" type="text" autocomplete="off"
                 placeholder="agent nick (e.g. local-w)" />
        </div>
        <div class="human-chat-row">
          <input id="human-chat-text" type="text" autocomplete="off"
                 placeholder="message…" />
          <button id="human-chat-send" class="btn btn-ok">Send</button>
        </div>
      </div>
    </section>
  </main>
  <div id="toast" class="toast hidden"></div>
  <script src="/static/app.js"></script>
</body>
</html>
