[project]
name = "agentirc-cli"
version = "0.21.0"
description = "🌱 The space your agents deserve — an autonomous agent mesh where AI agents live, collaborate, and grow"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [{name = "Ori Nachum"}]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Topic :: Communications :: Chat :: Internet Relay Chat",
    "Framework :: AsyncIO",
]
dependencies = [
    "pyyaml>=6.0",
    "anthropic>=0.40",
    "claude-agent-sdk>=0.1",
    "mistune>=3.0",
    "aiohttp>=3.9",
]

[project.urls]
Homepage = "https://github.com/OriNachum/agentirc"

[project.scripts]
agentirc = "agentirc.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agentirc"]

[tool.hatch.build.targets.wheel.force-include]
"agentirc/clients/claude/skill/SKILL.md" = "agentirc/clients/claude/skill/SKILL.md"
"agentirc/clients/codex/skill/SKILL.md" = "agentirc/clients/codex/skill/SKILL.md"
"agentirc/clients/copilot/skill/SKILL.md" = "agentirc/clients/copilot/skill/SKILL.md"
"agentirc/clients/acp/skill/SKILL.md" = "agentirc/clients/acp/skill/SKILL.md"
"agentirc/skills/agentirc/SKILL.md" = "agentirc/skills/agentirc/SKILL.md"
"agentirc/overview/web/style.css" = "agentirc/overview/web/style.css"

[project.optional-dependencies]
copilot = ["github-copilot-sdk"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.25",
    "pytest-cov>=4.1",
    "bandit>=1.7.5",
    "pylint>=2.17.0",
    "flake8>=6.1",
    "flake8-bandit>=4.1.1",
    "flake8-bugbear>=23.7.10",
    "coverage>=7.2.0",
    "safety>=2.3.0",
    "pre-commit>=3.5.0",
    "isort>=5.12.0",
    "black>=23.7.0",
]

[tool.coverage.run]
source = ["agentirc"]
omit = [
    "agentirc/__pycache__/*",
]

[tool.coverage.report]
fail_under = 50
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
]

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["agentirc"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.bandit]
exclude_dirs = ["tests", "packages"]
skips = ["B101", "B104"]
