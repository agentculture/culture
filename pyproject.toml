[project]
name = "culture"
version = "10.3.4"
description = "The professional workspace for agents."
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [{name = "Ori Nachum"}]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Topic :: Communications :: Chat :: Internet Relay Chat",
    "Framework :: AsyncIO",
]
dependencies = [
    "pyyaml>=6.0",
    "agentirc-cli>=9.6,<10",
    "anthropic>=0.40",
    "claude-agent-sdk>=0.1",
    "mistune>=3.0",
    "aiohttp>=3.9",
    "textual>=1.0",
    "agex-cli>=0.13,<1.0",
    "afi-cli>=0.3,<1.0",
    "irc-lens>=0.5.1,<1.0",
    "opentelemetry-api>=1.25",
    "opentelemetry-sdk>=1.25",
    "opentelemetry-exporter-otlp-proto-grpc>=1.25",
    "opentelemetry-semantic-conventions>=0.46b0",
    "opentelemetry-instrumentation-aiohttp-server>=0.46b0",
]

[project.urls]
Homepage = "https://github.com/OriNachum/culture"

[project.scripts]
culture = "culture.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["culture"]

[tool.hatch.build.targets.wheel.force-include]
"culture/clients/claude/skill/SKILL.md" = "culture/clients/claude/skill/SKILL.md"
"culture/clients/codex/skill/SKILL.md" = "culture/clients/codex/skill/SKILL.md"
"culture/clients/copilot/skill/SKILL.md" = "culture/clients/copilot/skill/SKILL.md"
"culture/clients/acp/skill/SKILL.md" = "culture/clients/acp/skill/SKILL.md"
"culture/skills/culture/SKILL.md" = "culture/skills/culture/SKILL.md"
"culture/skills/communicate/SKILL.md" = "culture/skills/communicate/SKILL.md"
"culture/skills/communicate/scripts/post-issue.sh" = "culture/skills/communicate/scripts/post-issue.sh"
"culture/skills/communicate/scripts/mesh-message.sh" = "culture/skills/communicate/scripts/mesh-message.sh"
"culture/overview/web/style.css" = "culture/overview/web/style.css"
"culture/bots/system/welcome/bot.yaml" = "culture/bots/system/welcome/bot.yaml"

[project.optional-dependencies]
copilot = ["github-copilot-sdk"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.25",
    "pytest-xdist>=3.0",
    "pytest-cov>=4.1",
    "bandit>=1.7.5",
    "pylint>=2.17.0",
    "flake8>=6.1",
    "flake8-bandit>=4.1.1",
    "flake8-bugbear>=23.7.10",
    "coverage>=7.2.0",
    "safety>=2.3.0",
    "pre-commit>=3.5.0",
    "isort>=5.12.0",
    "black>=23.7.0",
]

[tool.coverage.run]
source = ["culture"]
omit = [
    "culture/__pycache__/*",
]

[tool.coverage.report]
fail_under = 50
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
]

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["culture"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.bandit]
exclude_dirs = ["tests", "packages"]
skips = ["B101", "B104", "B105", "B108", "B110", "B112", "B310", "B404", "B406", "B603", "B606", "B607"]
