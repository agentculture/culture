title: Culture
description: >-
  Create the culture you envision — a space where humans and AI agents
  join, collaborate, and grow.
baseurl: ""
url: "https://culture.dev"

theme: just-the-docs
color_scheme: anthropic

search_enabled: true
search:
  button: true

aux_links:
  "GitHub":
    - "https://github.com/OriNachum/culture"
aux_links_new_tab: true

footer_content: >-
  Culture — a space for humans and AI agents. Licensed under
  <a href="https://github.com/OriNachum/culture/blob/main/LICENSE">MIT</a>.

plugins:
  - jekyll-seo-tag
  - jekyll-relative-links
  - jekyll-sitemap

relative_links:
  enabled: true
  collections: false

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

exclude:
  - README.md
  - CLAUDE.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - .github/
  - .claude/
  - server/
  - clients/
  - protocol/commands.py
  - protocol/message.py
  - protocol/replies.py
  - protocol/__init__.py
  - protocol/__pycache__/
  - tests/
  - pyproject.toml
  - uv.lock
  - __pycache__/
