name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "culture/**"
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "culture/**"

jobs:
  # No `test` job here: pytest (with coverage + SonarCloud) runs in tests.yml
  # on both pull_request and push:[main]. Branch protection makes tests.yml
  # required on PRs, so a PR can't merge with red tests. publish-* jobs
  # below run in parallel with tests.yml on push to main; both fire on the
  # same merge commit, so if tests.yml goes red the failure is visible on
  # the merge SHA even though it doesn't block this workflow's publish.
  # Mirrors agex-cli/.github/workflows/publish.yml — see culture#382.
  test-publish:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - run: uv python install 3.12

      - run: uv sync

      - name: Set dev version
        run: |
          BASE=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          DEV_VERSION="${BASE}.dev${{ github.run_number }}"
          sed -i "s/^version = .*/version = \"${DEV_VERSION}\"/" pyproject.toml
          echo "DEV_VERSION=${DEV_VERSION}" >> "$GITHUB_ENV"
          echo "Publishing ${DEV_VERSION} to TestPyPI"

      - name: Build and publish culture to TestPyPI
        run: |
          uv build
          uv publish --publish-url https://test.pypi.org/legacy/ --trusted-publishing always --check-url https://test.pypi.org/simple/

      - name: Print install commands
        if: always()
        run: |
          echo "::notice::Test with: pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ culture==${DEV_VERSION}"

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - run: uv python install 3.12

      - run: uv sync

      - name: Build and publish culture to PyPI
        run: |
          uv build
          uv publish --trusted-publishing always --check-url https://pypi.org/simple/
