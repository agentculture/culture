sonar.projectKey=OriNachum_culture
sonar.projectName=Culture
sonar.projectVersion=1.0.0

# Path to source directories
sonar.sources=culture
sonar.tests=tests

# Language
sonar.language=python
sonar.python.version=3.12

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Python coverage report
sonar.python.coverage.reportPaths=coverage.xml

# Exclude patterns
sonar.exclusions=**/packages/**,**/__pycache__/**,**/test_*.py

# Citation pattern (cite, don't import): backend harness files
# (daemon.py, socket_server.py, irc_transport.py across each client)
# are intentionally duplicated. Exclude from copy-paste detection.
sonar.cpd.exclusions=culture/clients/**/daemon.py,culture/clients/**/socket_server.py,culture/clients/**/irc_transport.py

# Security-related settings
sonar.python.bandit.reportPaths=bandit-results.json
sonar.python.pylint.reportPaths=pylint-results.json

# Quality gate configuration
sonar.qualitygate.wait=true

# Issue exclusions — documented, project-accepted rule scoping.
#
# python:S4828 ("Make sure that sending signals is safe here") fires on
# every call to os.kill. In culture/cli/chat.py, the only os.kill sites
# (_force_kill and _server_stop) signal the IRCd daemon and only run
# after a four-step validation chain — read_pid() reads from culture's
# own ~/.culture/pids/server-<name>.pid file, then is_process_alive()
# confirms the process exists, then is_culture_process() confirms the
# executable matches culture's, then (only then) os.kill runs. We never
# signal an arbitrary system PID. The validation chain is documented
# inline (NOSONAR S4828 comments) for human reviewers.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S4828
sonar.issue.ignore.multicriteria.e1.resourceKey=culture/cli/chat.py
