sonar.projectKey=agentculture_culture
sonar.organization=agentculture
sonar.projectName=Culture
sonar.projectVersion=1.0.0

# Path to source directories — the front-door package and the in-tree
# culture_core engine (merge-back, #462).
sonar.sources=culture,culture_core
sonar.tests=tests

# Language
sonar.language=python
sonar.python.version=3.12

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Python coverage report
sonar.python.coverage.reportPaths=coverage.xml

# Exclude patterns. Three categories:
#   - **/packages/**            citation-pattern reference impl, lives elsewhere
#   - **/__pycache__/**         build artifacts
#   - **/test_*.py              tests are not production code
#   - .claude/skills/cicd/**    vendored verbatim from steward (cite-don't-import);
#                               stylistic findings should be fixed upstream in
#                               steward, not forked here
# (The pre-merge coverage/cpd exclusions for the culture/clients/* re-export
# shims are gone with those paths: since the #462 merge-back the client
# packages live at culture_core/clients/, hold only config/constants/skill —
# the daemons live in cultureagent — and are coverage-gated normally, exactly
# as they were in culture-core's own SonarCloud project.)
sonar.exclusions=**/packages/**,**/__pycache__/**,**/test_*.py,.claude/skills/cicd/**

# Quality gate: block CI until SonarCloud decides, with a hard timeout so
# slow/unavailable SonarCloud doesn't hang the runner indefinitely.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=600

# Issue exclusions — documented, project-accepted rule scoping.
#
# python:S4828 ("Make sure that sending signals is safe here") fires on
# every call to os.kill. In culture_core/cli/server.py (renamed back from
# chat.py in 10.0.0; moved with the engine in the #462 merge-back), the
# only os.kill sites (_force_kill and _server_stop) signal the IRCd
# daemon and only run after a four-step validation chain — read_pid()
# reads from culture's own ~/.culture/pids/server-<name>.pid file, then
# is_process_alive() confirms the process exists, then
# is_culture_process() confirms the executable matches culture's, then
# (only then) os.kill runs. We never signal an arbitrary system PID. The
# validation chain is documented inline (NOSONAR S4828 comments) for
# human reviewers.
# python:S5332 ("Using HTTP protocol is insecure") fires on the overview
# dashboard's httpd.serve_forever() in culture_core/overview/renderer_web.py.
# The dashboard binds 127.0.0.1 ONLY (hardcoded at the bind site) — the
# socket is never reachable off-box, which is the rule's own accepted
# exception for clear-text protocols. The module enforces the coupling in
# code: _LOOPBACK_HOSTS is the single source of truth and _dashboard_url
# derives the scheme from it, so `http://` can never pair with a
# non-loopback host. Documented inline in the module for human reviewers.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S4828
sonar.issue.ignore.multicriteria.e1.resourceKey=culture_core/cli/server.py
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.e2.resourceKey=culture_core/overview/renderer_web.py
