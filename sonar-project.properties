sonar.projectKey=agentculture_culture
sonar.organization=agentculture
sonar.projectName=Culture
sonar.projectVersion=1.0.0

# Path to source directories
sonar.sources=culture
sonar.tests=tests

# Language
sonar.language=python
sonar.python.version=3.12

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Python coverage report
sonar.python.coverage.reportPaths=coverage.xml

# Coverage exclusions: re-export shims forwarding to cultureagent
# (`from cultureagent.clients.* import *`). The shims contain no
# culture-side logic — they are pure re-exports kept so existing
# `from culture.clients.* import ...` imports keep working after the
# 11.0.0 Phase 1 cutover. Coverage of the underlying implementation
# is enforced inside cultureagent's own CI. Exempting them here keeps
# SonarCloud's "new code coverage" gate aligned with what's actually
# testable on culture's side.
sonar.coverage.exclusions=culture/clients/shared/*.py,culture/clients/claude/config.py,culture/clients/claude/constants.py,culture/clients/codex/config.py,culture/clients/codex/constants.py,culture/clients/copilot/config.py,culture/clients/copilot/constants.py,culture/clients/acp/config.py,culture/clients/acp/constants.py

# Exclude patterns. Three categories:
#   - **/packages/**            citation-pattern reference impl, lives elsewhere
#   - **/__pycache__/**         build artifacts
#   - **/test_*.py              tests are not production code
#   - .claude/skills/cicd/**    vendored verbatim from steward (cite-don't-import);
#                               stylistic findings should be fixed upstream in
#                               steward, not forked here
sonar.exclusions=**/packages/**,**/__pycache__/**,**/test_*.py,.claude/skills/cicd/**

# Citation pattern (cite, don't import): backend harness files are
# intentionally duplicated across `culture/clients/<backend>/`. Each
# backend owns its copy and customizes for its SDK. Exclude from
# copy-paste detection so the gate doesn't fail on intentional
# parallels (e.g. codex's and acp's stdio-JSON-RPC subprocess
# lifecycle helpers).
sonar.cpd.exclusions=culture/clients/**/daemon.py,culture/clients/**/socket_server.py,culture/clients/**/irc_transport.py,culture/clients/**/constants.py,culture/clients/**/agent_runner.py

# Quality gate: block CI until SonarCloud decides, with a hard timeout so
# slow/unavailable SonarCloud doesn't hang the runner indefinitely.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=600

# Issue exclusions — documented, project-accepted rule scoping.
#
# python:S4828 ("Make sure that sending signals is safe here") fires on
# every call to os.kill. In culture/cli/server.py (renamed back from
# chat.py in 10.0.0), the only os.kill sites (_force_kill and
# _server_stop) signal the IRCd daemon and only run after a four-step
# validation chain — read_pid() reads from culture's own
# ~/.culture/pids/server-<name>.pid file, then is_process_alive()
# confirms the process exists, then is_culture_process() confirms the
# executable matches culture's, then (only then) os.kill runs. We never
# signal an arbitrary system PID. The validation chain is documented
# inline (NOSONAR S4828 comments) for human reviewers.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S4828
sonar.issue.ignore.multicriteria.e1.resourceKey=culture/cli/server.py
