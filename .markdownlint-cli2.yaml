# culture project markdownlint-cli2 configuration
# Consumed by the markdownlint-cli2 pre-commit hook (see .pre-commit-config.yaml).

config:
  default: true
  # MD013: Line length — too noisy for content-heavy docs
  MD013: false
  # MD060: Table pipe spacing — stylistic preference
  MD060: false
  # MD024: Duplicate headings — allow siblings_only so the Keep-a-Changelog
  # pattern (### Added / ### Changed / ### Fixed repeated per release) passes.
  MD024:
    siblings_only: true
  # MD025: Multiple top-level H1s — some reference docs intentionally
  # use multiple `# Heading` sections for parallel reference entries.
  MD025: false
  # MD033: Inline HTML — reference docs occasionally embed inline HTML
  # (tables with badges, SVG diagrams in architecture pages).
  MD033: false
  # MD041: First line must be H1 — relaxed because CHANGELOG.md and a
  # handful of reference indices open with a paragraph rather than an H1.
  MD041: false

# Ignore patterns
ignores:
  - "node_modules/**"
  - ".local/**"
  - "docs/superpowers/**"  # internal plan/spec drafts
  # Engine package data (bundled SKILL.md, brief templates) — shipped verbatim
  # in the wheel via the force-include manifest; not reformatted here.
  - "culture_core/**"
